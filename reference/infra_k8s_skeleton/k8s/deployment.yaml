# <agent_name> — agent-worker Deployment
# プロジェクト固有部分を <placeholder> で示す。実 cluster に合わせて調整。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: <agent_name>-worker
  namespace: <namespace>
  labels:
    app: <agent_name>
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: <agent_name>
      component: worker
  template:
    metadata:
      labels:
        app: <agent_name>
        component: worker
    spec:
      serviceAccountName: <agent_name>
      containers:
      - name: agent
        image: <image_registry>/<agent_name>:v1.0.0
        imagePullPolicy: IfNotPresent
        command: ["python", "/app/scripts/worker.py"]
        env:
        - name: AGENT_CONFIG
          value: /app/scripts/config/<config_yaml>
        - name: REDIS_HOST
          value: redis.<namespace>.svc.cluster.local
        - name: REDIS_QUEUE
          value: <agent_name>:queue
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: <agent_name>-secrets
              key: anthropic_api_key
        - name: DD_API_KEY
          valueFrom:
            secretKeyRef:
              name: <agent_name>-secrets
              key: datadog_api_key
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: <agent_name>-worker
  namespace: <namespace>
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: <agent_name>-worker
  minReplicas: 3
  maxReplicas: 8
  metrics:
  - type: External
    external:
      metric:
        name: redis_queue_depth
        selector:
          matchLabels:
            queue: <agent_name>:queue
      target:
        type: AverageValue
        averageValue: "50"
---
apiVersion: v1
kind: Service
metadata:
  name: <agent_name>
  namespace: <namespace>
spec:
  selector:
    app: <agent_name>
    component: worker
  ports:
  - name: health
    port: 8001
    targetPort: 8001
