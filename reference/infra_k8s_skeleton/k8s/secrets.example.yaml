# シークレット雛形 — 実 cluster では Vault / 1Password から sealed-secret として注入する
# このファイルは Git にコミットしない (.gitignore 対象、example のみコミット)
apiVersion: v1
kind: Secret
metadata:
  name: <agent_name>-secrets
  namespace: <namespace>
type: Opaque
stringData:
  anthropic_api_key: "sk-ant-XXXXXXXXX"  # 90日ローテーション
  webhook_hmac_secret: "XXXXXXXXX"  # 180日ローテーション
  datadog_api_key: "XXXXXXXXX"
  slack_webhook_url: "https://hooks.slack.com/services/XXXXX/YYYYY/ZZZZZ"
  db_password: "XXXXXXXXX"  # 180日ローテーション
