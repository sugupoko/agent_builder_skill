# テーマ駆動 YAML のテンプレート
#
# このファイルをコピーして scripts/config.yaml の起点に。
# 業務担当者が触れるレベルまで切り出すのが目標。
# Python コードを変えずに、ここを編集するだけで挙動を変えられること。

# ==========================================================
# 基本情報
# ==========================================================
theme: <テーマ名（人間に見える名前）>
slug: <ファイル名やID用の英数字>
period_days: 7                # 何日分のデータを対象にするか
top_per_category: 5           # 各カテゴリの上位N件
max_other_items: 25           # 「その他」に出す上限

# ==========================================================
# 跨実行の重複排除（SQLite）
# ==========================================================
dedup_across_runs: true       # 過去実行で見たURL/正規化タイトルは弾く
dedup_window_days: 90         # 直近90日以内の記録のみで判定。0/未指定で無制限
db_path: data/articles.db     # SQLite ファイルの場所

# ==========================================================
# カテゴリの並び順（出力レポートの章立て）
# ==========================================================
category_order:
  - <カテゴリ1>
  - <カテゴリ2>
  - <カテゴリ3>

# ==========================================================
# 出力先・件名・冒頭挨拶
# ==========================================================
mail:
  subject_prefix: "[週報]"
  from: agent@example.com
  to: team@example.com
  intro: |
    本文冒頭の挨拶。複数行可。

# ==========================================================
# 編集者の声（最重要 — LLMプロンプトに注入される）
# ==========================================================
editorial:
  # この人になりきって書いてもらう
  persona: |
    20年の○○業界経験を持つ編集者。
    △△ に詳しく、現場の運用課題を熟知。

  # どういう視点で書くか
  perspective: |
    - 「で、ウチはどう動くか」を常に問う実務志向
    - 広報的成功談より、現場のつまずきに着目
    - 単発の出来事より構造的変化を読み取る

  # 守るべき執筆ルール
  rules: |
    - 「業界が活況」「期待が高まる」のような汎用表現は禁止
    - 数字・固有名詞・日付を必ず含める
    - 同案件の重複ソースは1件にマージ
    - 「読者が今週・来週・来月にすべきアクション」を最低3件挙げる

# ==========================================================
# 主要プレイヤー動向ウォッチ（固定枠）
# ==========================================================
watchlist:
  title: 主要プレイヤー動向ウォッチ
  description: 主要プレイヤーの動きを毎週チェック
  entities:
    - name: <組織名1>
      keywords: ["<正式名1>", "<略称1>"]
    - name: <組織名2>
      keywords: ["<正式名2>"]

# ==========================================================
# 信頼ソース管理（誤マッチや低信頼ソースの除外）
# ==========================================================
trusted_publishers:
  blocklist:
    - "<除外したい出版社1>"
    - "<除外したい出版社2>"

# ==========================================================
# ノイズ・誤マッチ語の除外
# ==========================================================
exclude_keywords:
  - <除外語1>
  - <除外語2>

# ==========================================================
# 出力セクションの ON/OFF
# ==========================================================
sections:
  headline: true              # 動的タイトル（件名にも使用）
  weekly_todos: true          # 実務TODO
  editor_take: true           # 編集者の見立て
  vendor_watchlist: true      # ウォッチリスト動向
  upcoming_calendar: true     # 来週以降の注目カレンダー
  numbers_view: true          # 数字で見る今週

# ==========================================================
# ソース定義（リサーチ系の場合）
# ==========================================================
sources:
  - name: <ソース名1>
    type: google_news_rss     # google_news_rss / generic_rss / pubmed / その他
    lang: ja                  # ja / en
    category: <カテゴリ1>
    keywords:
      - <キーワード1>
      - <キーワード2>

  - name: <ソース名2>
    type: generic_rss
    category: <カテゴリ2>
    url: <RSS URL>
    keywords:
      - <絞り込み語>
