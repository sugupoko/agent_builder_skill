# CS Triage Agent v3 メイン設定
# v2 → v3 改善点（data/hearing_round_2.md, reports/evolve_v3_report.md 参照）:
#   - category_priority: rule-based classify のタイブレーク用優先順位
#   - forbidden_internal_phrases: reflect でハードチェック
#   - urgency_rules: high/normal/low の境界条件を明文化
#   - apology: complaint=False 時の禁止語と許容語を分離
#   - db_value_policies: カテゴリ別の DB 値記載ポリシー
# CS センター長が直接編集する想定。SE レビューは型番 regex 追加・LLM プロンプト変更時のみ。

slug: cs_triage_v3

# ==========================================================
# モデル選定
# ==========================================================
models:
  classify: claude-sonnet-4-6
  draft: claude-sonnet-4-6
  draft_lite: claude-haiku-4-5-20251001
  reflect: claude-sonnet-4-6
  extract_assist: claude-haiku-4-5-20251001

# ==========================================================
# 編集者ペルソナ（ベテランオペ「中島」の判断スキル）
# ==========================================================
editorial:
  persona: |
    あなたは中堅 B2B 部品商社のベテラン CS オペレータ。勤続 10 年超で、
    機械工学の独学知識を持ち、材料力学・表面処理・公差まで一通り答えられる。
    新人が見抜けない「型番に隠れた仕様」「客が本当に聞きたかったこと」
    「クレームに化ける兆候」を嗅ぎ取るのが得意。
    最終回答ではなく、若手オペが顧客に送る前の「下書き」を高速に仕上げるのが
    あなたの役割。

  perspective: |
    - 型番のプレフィックス・桁数・末尾オプションから仕様を読む。本文でも型番の意味を一言補足する:
      - 例: SHA-M6-20-N → SHA カテゴリ、M6=呼びネジ径 6mm、20=長さ 20mm、N=表面処理(ニッケル)
      - 例: BLR-25-SUS304 → BLR カテゴリ、25=サイズ、SUS304=材質
      - 例: PIN-D5-L20 → PIN カテゴリ、D5=直径 5mm、L20=長さ 20mm
    - 「代替品/廃番/後継」を聞かれたらまず現品の生産状況を確認し、廃番なら後継品を理由付きで先回り提示
    - 材質・耐熱・精度の質問は単独回答せず使用環境を逆質問する。逆質問は具体的に以下から該当する 2〜3 項目を挙げる:
      - 使用温度（上限・下限・常温/連続/間欠）
      - 接触する薬品・流体・雰囲気（油・酸・アルカリ・大気）
      - 静的/動的荷重、求められる精度グレード（はめあい公差クラス等）
      - コスト要件・納期要件
    - クレーム匂いキーワード検出時はお詫び一言 + 担当者引き継ぎフラグ
    - 「とりあえず急ぎ」には希望納期を必ず聞き返す
    - 注文番号と型番が混在したら両方とも全件抽出して処理対象にする

  rules: |
    - 推測で断定しない。不確実な情報は「現在確認中です」「担当より折り返しご連絡します」
    - **DB 引き当て値はカテゴリ別ポリシー（db_value_policies）に従う**。在庫数は「充足/部分/欠品」のレベル感、納期は数値+営業日明示、配達日は YYYY-MM-DD、追跡は URL+業者名のみ、価格は税抜単価
    - **complaint_smell=False のケースでは、お詫び表現（apology.forbidden_when_no_complaint = 「申し訳」「お詫び」「ご迷惑」）を本文に入れない**。許容される共感表現（apology.allowed = 「お手数」「ご不便」「ご心配」）は使ってよい
    - **CAD URL は顧客本文に直接書かない**。本文では「CAD データは担当者より別途ご案内いたします」とし、URL は internal_memo にのみ記載
    - **forbidden_internal_phrases に該当する語は禁止**（reflect ノードでハードチェック、検出時は再起草）
    - 値引き約束は禁止（営業判断のため）
    - 一文 60 文字以内を目安に、敬体・丁寧語で

# ==========================================================
# カテゴリ判定キーワード（決定論コードで前段スキャン）
# ==========================================================
categories:
  inventory:
    keywords: ["在庫", "納期", "いつ届く", "在ります", "出荷"]
  tech:
    keywords: ["材質", "耐熱", "耐食", "精度", "公差", "違い", "比較", "互換"]
  alternative:
    keywords: ["代替", "後継", "廃番", "同等品", "互換品"]
  shipment:
    keywords: ["配送", "追跡", "届いて", "発送", "出荷状況", "遅延"]
  cad:
    keywords: ["CAD", "図面", "DXF", "STEP", "PDF"]
  billing:
    keywords: ["請求", "請求書", "領収書", "金額", "支払い", "再発行", "経理"]
  complaint:
    keywords: ["違う", "間違って", "おかしい", "不良", "破損"]
  other:
    keywords: []

# ==========================================================
# クレーム匂い（再現率優先で別系統 keyword）
# ==========================================================
complaint_keywords:
  - 至急
  - 困って
  - 何度目
  - まだ
  - 結局
  - 前回も

# ==========================================================
# 型番 / 注文番号 regex（YAML から読む。テストドリフト防止）
# ==========================================================
sku_patterns:
  - name: standard
    regex: '\b(?!(?:ORD|INV|REF|REQ|FAX|TEL)-)[A-Z]{2,5}-[A-Z]?M?\d{1,4}(?:-\d{1,4})?(?:-[A-Z]+\d*)?\b'

order_no_patterns:
  - name: standard
    regex: '\bORD-\d{4}-\d{5,6}\b'

# ==========================================================
# v3: rule-based classify のタイブレーク優先順位
# ==========================================================
# 同点キーワードヒット時はこの順位の左から順に採用する
# complaint > alternative の理由: SV 通知最優先（業務 round-2 §A-9）
category_priority:
  - complaint
  - alternative
  - shipment
  - billing
  - tech
  - cad
  - inventory
  - other

# ==========================================================
# v3: 内部用語禁止辞書（reflect ノードでハードチェック）
# ==========================================================
forbidden_internal_phrases:
  - 工場の都合
  - うちのシステム
  - 上が言うには
  - 弊社内事情
  - 資材の入荷
  - 対応中
  - 社内検討中
  - 営業に確認

# ==========================================================
# v3: urgency ラベルの境界条件（classify と eval メタの両方で参照）
# ==========================================================
urgency_rules:
  high_keywords:
    - 至急
    - 今日中
    - 明日まで
    - 製造ライン停止
    - ライン停止
    - 急ぎ
  high_complaint_smell: true            # complaint_smell=True なら自動 high
  high_delivery_delay_hours: 24         # 配送遅延 24h 超で high
  low_keywords:
    - お時間あるとき
    - お時間のあるとき
    - いずれ
    - お手すきの折に

# ==========================================================
# v3: apology 範囲（draft プロンプト + eval スコアリング）
# ==========================================================
apology:
  forbidden_when_no_complaint:          # complaint=False で本文禁止
    - 申し訳
    - お詫び
    - ご迷惑
  allowed:                              # 共感表現（complaint False でも OK）
    - お手数
    - ご不便
    - ご心配

# ==========================================================
# v3: DB 値カテゴリ別記載ポリシー（draft プロンプトに注入）
# ==========================================================
db_value_policies:
  inventory:
    stock_qty: level_only              # 「充足」「部分」「欠品」
    ship_eta_days: number_with_unit    # 「14 営業日」
    price: tax_excluded_number         # 税抜単価を数値で
  shipment:
    estimated_delivery: date_iso        # YYYY-MM-DD で明示
    tracking_url: url_with_carrier      # URL + 業者名のみ。追跡番号は internal_memo
    delay_reason: disclose              # 遅延理由は隠さない
  alternative:
    successor_sku: with_reason          # 後継品 + 理由必須
    stock_qty: level_only
  cad:
    cad_url: internal_memo_only         # CAD URL は本文に出さず、internal_memo のみ

# ==========================================================
# テンプレ文言（必須語含有チェックの基準にもなる）
# ==========================================================
templates:
  greeting: "お世話になっております。"
  closing: "ご確認のほどよろしくお願いいたします。"
  apology_prefix: "この度はご不便をおかけし、誠に申し訳ございません。"
  english_transfer: "Thank you for your inquiry. We will transfer your request to our English support team."
  fallback_db_error: "在庫情報を確認中です。担当より折り返しご連絡いたします。"

# ==========================================================
# Reflection 制御（コスト爆発防止）
# ==========================================================
reflection:
  max_iterations: 1   # NG なら 1 回まで draft 再起動。それ以上は警告フラグ付きで assemble

# ==========================================================
# コスト上限（運用ガード）
# ==========================================================
cost:
  max_per_request_usd: 0.10
  max_monthly_usd: 3000
